description: >-
  Celgene Corporation was a global biopharmaceutical company focused on the discovery,
  development, and commercialization of innovative therapies for cancer and
  immune-inflammatory diseases. Celgene was acquired by Bristol Myers Squibb (BMS)
  in November 2019 and its operations are now consolidated under BMS. No public
  developer API has been identified; engagement is organized through BMS clinical
  trials, study connect, and investigator-sponsored research portals.
